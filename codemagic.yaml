# ================================================
# Codemagic YAML - TravelPlus (Flutter + Hive)
# สำหรับ build iOS IPA (ไม่ auto publish)
# ================================================

workflows:
  ios-build:
    name: iOS IPA Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    cache:
      cache_paths:
        - $HOME/.pub-cache
        - $HOME/.dart-tool

    scripts:
      - name: Install dependencies
        script: |
          flutter pub get

      - name: Generate code with build_runner (สำคัญสำหรับ Hive)
        script: |
          dart run build_runner build --delete-conflicting-outputs

      - name: Install CocoaPods
        script: |
          cd ios && pod install

      - name: Build iOS IPA
        script: |
          flutter build ipa --release \
            --export-options-plist=ios/ExportOptions.plist

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true

# ================================================
# หมายเหตุ:
# - ต้องมีโฟลเดอร์ ios/ ใน repository ก่อน
# - ต้องตั้งค่า Code Signing ใน Codemagic
# - ไฟล์ .ipa จะถูก export เป็น artifact ให้ดาวน์โหลด
# ================================================